replicaCount: 2

image:
  repository: ""  # Set to ECR URI at deploy time
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8001

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

env:
  KAFKA_BOOTSTRAP_SERVERS: ""        # Injected from Secret
  SCHEMA_REGISTRY_URL: ""            # Injected from ConfigMap
  LOG_LEVEL: "INFO"

livenessProbe:
  httpGet:
    path: /v1/health
    port: 8001
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /v1/health
    port: 8001
  initialDelaySeconds: 10
  periodSeconds: 5
