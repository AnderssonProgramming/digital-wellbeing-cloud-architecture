replicaCount: 2

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8003

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

env:
  KAFKA_BOOTSTRAP_SERVERS: ""
  INFLUXDB_URL: ""
  INFLUXDB_TOKEN: ""
  ORG_ANONYMIZATION_SECRET: ""
  LOG_LEVEL: "INFO"

livenessProbe:
  httpGet:
    path: /v1/health
    port: 8003
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /v1/health
    port: 8003
  initialDelaySeconds: 10
  periodSeconds: 5
