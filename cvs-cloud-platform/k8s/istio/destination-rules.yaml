# Circuit Breaker: Kong Gateway -> Kafka
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: kafka-circuit-breaker
  namespace: ns-ingestion
spec:
  host: kafka.ns-ingestion.svc.cluster.local
  trafficPolicy:
    outlierDetection:
      consecutiveGatewayErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 100
---
# Circuit Breaker: Normalizer -> InfluxDB
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: influxdb-circuit-breaker
  namespace: ns-data-ml
spec:
  host: influxdb.ns-data-ml.svc.cluster.local
  trafficPolicy:
    outlierDetection:
      consecutiveGatewayErrors: 3
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 100
---
# Circuit Breaker: Inference Service -> S3 (via AWS SDK, handled at app level)
# Stale model cache configured directly in inference-svc application code
