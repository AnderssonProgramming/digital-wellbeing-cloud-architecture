name: CI — Lint, Test, SAST

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: "${{ matrix.service }} — lint + test"
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        service: [rule-engine, normalizer, anonymizer, inference-svc]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          pip install --no-cache-dir pylint mypy pytest pytest-cov pytest-asyncio httpx
          pip install --no-cache-dir .

      - name: Lint (pylint)
        working-directory: services/${{ matrix.service }}
        run: |
          # Replace hyphen with underscore for the package name directory
          PKG_NAME=$(echo "${{ matrix.service }}" | sed 's/-/_/g')
          pylint $PKG_NAME/ --fail-under=8.0

      - name: Type check (mypy)
        working-directory: services/${{ matrix.service }}
        run: |
          PKG_NAME=$(echo "${{ matrix.service }}" | sed 's/-/_/g')
          mypy $PKG_NAME/ --ignore-missing-imports

      - name: Unit tests + coverage
        working-directory: services/${{ matrix.service }}
        run: |
          PKG_NAME=$(echo "${{ matrix.service }}" | sed 's/-/_/g')
          pytest tests/ \
            --cov=$PKG_NAME \
            --cov-report=xml \
            --cov-fail-under=15

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: services/${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}

  sonar-scan:
    name: SonarCloud SAST
    runs-on: ubuntu-22.04
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.scanner.skip=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-build:
    name: "${{ matrix.service }} — Docker build"
    runs-on: ubuntu-22.04
    needs: sonar-scan
    strategy:
      matrix:
        service: [rule-engine, normalizer, anonymizer, inference-svc]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image (Validation)
        working-directory: services/${{ matrix.service }}
        run: |
          docker build -t cvs-${{ matrix.service }}:test .

      - name: Skip AWS Push (No Credentials)
        run: echo "Skipping AWS ECR push as credentials are not configured."
