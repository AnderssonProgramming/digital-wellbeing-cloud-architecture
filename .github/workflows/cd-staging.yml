name: CD — Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    name: Helm deploy to ns-staging
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Lint Helm Charts
        run: |
          for svc in rule-engine normalizer anonymizer inference-svc; do
            echo "Linting $svc..."
            helm lint helm/$svc/
          done

      - name: Validate Kubernetes Manifests (Dry Run)
        run: |
          for svc in rule-engine normalizer anonymizer inference-svc; do
            echo "Validating $svc generation..."
            helm template $svc helm/$svc/ \
              --namespace ns-staging \
              --set image.tag=${{ github.sha }} > rendered.yaml
          done

  smoke-test-mock:
    name: Architecture Validation
    runs-on: ubuntu-22.04
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4
      - name: Verify Service Contracts
        run: |
          echo "Verifying API definitions and schemas..."
          # Aquí se podrían añadir validaciones de schemas Avro o OpenAPI
          echo "Validation complete."
